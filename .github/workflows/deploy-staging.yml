name: Deploy Staging Website

on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/configure-pages@v6
        id: pages

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: latest
          extended: true

      - name: Build
        run: |
          mkdir -p build/themes
          mkdir -p build/content/docs
          mkdir -p build/static/docs

          git clone --depth 1 https://github.com/alex-shpak/hugo-book build/themes/hugo-book

          cp docs/user-guide.md build/content/docs/user-guide.md
          cp -r docs/images build/static/docs/images

          cat > build/hugo.toml << 'EOF'
          baseURL = "/"
          title = "KeePassPasskey"
          theme = "hugo-book"
          uglyURLs = true

          [params]
            BookSearch = true
            BookRepo = "https://github.com/keepasspasskey/KeePassPasskey"
            BookEditPath = "edit/develop/docs"
            BookToC = true
          EOF

          cat > build/content/_index.md << 'EOF'
          ---
          title: KeePassPasskey
          ---
          EOF

          hugo --source build --minify --baseURL "${{ steps.pages.outputs.base_url }}/"

      - uses: actions/upload-pages-artifact@v5
        with:
          path: build/public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
