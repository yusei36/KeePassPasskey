name: Deploy Staging Website

on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/configure-pages@v6
        id: pages

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: latest
          extended: true

      - name: Build
        run: |
          mkdir -p build/themes
          mkdir -p build/content/docs
          mkdir -p build/static/docs

          git clone --depth 1 https://github.com/alex-shpak/hugo-book build/themes/hugo-book

          # Rewrites applied to every Markdown file before Hugo processes it:
          #   ../README.md#anchor → ../../#anchor  Hugo adds a directory level per page,
          #                                        so one extra ../ is needed to reach the root
          #   page.md)            → page/)         Hugo uses directory-style URLs by default
          #   ](images/           → ](../images/   images live at /docs/images/,
          #   src="images/        → src="../images/ not at /docs/<page>/images/
          fix_links() {
            sed \
              -e 's|\.\./README\.md#\([^)]*\))|../../#\1)|g' \
              -e 's/\.md)/\/)/g' \
              -e 's|](images/|](../images/|g' \
              -e 's|src="images/|src="../images/|g'
          }

          for f in docs/*.md; do
            fix_links < "$f" > "build/content/docs/$(basename "$f")"
          done
          cp -r docs/images build/static/docs/images

          cat > build/hugo.toml << 'EOF'
          baseURL = "/"
          title = "KeePassPasskey"
          theme = "hugo-book"

          [markup.goldmark.renderer]
            unsafe = true

          [params]
            BookTheme = "auto"
            BookSearch = true
            BookRepo = "https://github.com/keepasspasskey/KeePassPasskey"
            BookEditPath = "edit/develop/docs"
            BookToC = true
          EOF

          mkdir -p build/layouts/partials/docs/inject

          cat > build/layouts/partials/docs/inject/head.html << 'EOF'
          <script>
          (function () {
            var saved     = localStorage.getItem("book-theme");
            var preferred = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
            document.documentElement.setAttribute("data-theme", saved || preferred);
          })();
          </script>
          <style>
          :root, [data-theme="light"] {
            --body-background: #ffffff;
            --body-font-color: #1f2328;
            --color-link:      #0969da;
            --gray-100:        #d0d7de;
            --gray-200:        #f6f8fa;
            --gray-500:        #57606a;
          }
          [data-theme="dark"] {
            --body-background: #0d1117;
            --body-font-color: #e6edf3;
            --color-link:      #58a6ff;
          }
          [data-theme="dark"] code { background-color: #161b22; color: #e6edf3; }
          [data-theme="dark"] pre  { background-color: #161b22; }
          </style>
          EOF

          cat > build/layouts/partials/docs/inject/menu-after.html << 'EOF'
          <div style="padding: 0.5rem 1rem; border-top: 1px solid var(--gray-100, #ddd);">
            <button id="book-theme-toggle"
                    style="background:none; border:none; cursor:pointer; color:inherit; font-size:0.875rem; padding:0.25rem 0;">
            </button>
          </div>
          <script>
          (function () {
            var btn = document.getElementById("book-theme-toggle");

            function getTheme()       { return document.documentElement.getAttribute("data-theme") || "light"; }
            function updateButton(t)  { btn.textContent = t === "dark" ? "☀ Enable light mode" : "🌙 Enable dark mode"; }

            btn.addEventListener("click", function () {
              var next = getTheme() === "dark" ? "light" : "dark";
              document.documentElement.setAttribute("data-theme", next);
              localStorage.setItem("book-theme", next);
              updateButton(next);
            });

            updateButton(getTheme());
          })();
          </script>
          EOF

          printf -- '---\nurl: /\n---\n\n' > build/content/_index.md
          fix_links < README.md >> build/content/_index.md

          hugo --source build --minify --baseURL "${{ steps.pages.outputs.base_url }}/"

      - uses: actions/upload-pages-artifact@v5
        with:
          path: build/public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
