name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-2025-vs2026

    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build (Debug, unsigned)
        shell: pwsh
        run: .\scripts\Publish-Package.ps1 -Configuration Debug -SkipSign

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KeePassPasskey-debug-unsigned
          path: build\KeePassPasskey-*.zip
