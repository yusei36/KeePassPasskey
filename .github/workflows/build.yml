name: Build

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      build_release:
        description: 'Also build Release (unsigned)'
        type: boolean
        default: false

jobs:
  build:
    runs-on: windows-2025-vs2026

    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Build (Debug, unsigned)
        shell: pwsh
        run: .\scripts\Publish-Package.ps1 -Configuration Debug -SkipSign

      - name: Build (Release, unsigned)
        if: github.ref == 'refs/heads/master' || inputs.build_release
        shell: pwsh
        run: .\scripts\Publish-Package.ps1 -Configuration Release -SkipSign

      - name: Upload artifact (Debug)
        uses: actions/upload-artifact@v7
        with:
          name: KeePassPasskey-debug-unsigned
          path: build\KeePassPasskey-*-debug-unsigned.zip

      - name: Upload artifact (Release)
        if: github.ref == 'refs/heads/master' || inputs.build_release
        uses: actions/upload-artifact@v7
        with:
          name: KeePassPasskey-release-unsigned
          path: |
            build\KeePassPasskey-*.zip
            !build\KeePassPasskey-*-debug-*.zip
