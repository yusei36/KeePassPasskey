name: Deploy Website

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/build-website
        with:
          edit_path: edit/master/docs

      - name: Push to keepasspasskey.github.io
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git clone https://x-access-token:${{ secrets.PAGES_DEPLOY_TOKEN }}@github.com/keepasspasskey/keepasspasskey.github.io.git pages-repo

          rm -rf pages-repo/*
          cp -r build/public/. pages-repo/

          cd pages-repo
          git add -A
          git diff --cached --quiet || git commit -m "Deploy website (keepasspasskey/KeePassPasskey@${{ github.sha }})"
          git push
